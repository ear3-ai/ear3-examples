name: Bug report
description: Something in an example doesn't work
labels: ["bug"]
body:
  - type: dropdown
    id: example
    attributes:
      label: Which example?
      options:
        - simple-iframe
        - simple-react
        - simple-webhook
        - Repo-wide (CI, tooling)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Steps to reproduce and what you saw.
      placeholder: |
        1. `npm install`
        2. `npm run dev`
        3. Opened http://localhost:3000
        4. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: v20.11.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 14.4 / Ubuntu 22.04 / Windows 11

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
